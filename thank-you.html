<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thank You — Aurum Import Group</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#FFFFFF;--cream:#FAF8F4;--cream2:#F2EBE0;--cream3:#E4D9CB;
  --beige:#C8B89E;--brownlt:#2E2318;--brown:#1A1108;--ink:#0F0A05;--gold:#7A5A28;
}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:19px;line-height:1.8;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:space-between;padding:24px 60px;background:rgba(255,255,255,0.97);border-bottom:1px solid var(--cream3)}
.nav-logo{font-family:Georgia,serif;font-size:1.4rem;font-weight:600;letter-spacing:.12em;color:var(--brown);text-decoration:none}
.nav-logo em{font-style:italic;font-weight:300;color:var(--brownlt)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 60px}
.card{max-width:560px;width:100%;text-align:center}
.card-label{font-size:.7rem;letter-spacing:.38em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:14px}
.card-label::before,.card-label::after{content:'';width:28px;height:1px;background:var(--gold)}
.card-title{font-family:Georgia,serif;font-size:clamp(2.2rem,4vw,3.2rem);font-weight:400;color:var(--brown);line-height:1.15;margin-bottom:24px}
.card-title em{font-style:italic;color:var(--gold)}
.divider{width:48px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:0 auto 28px}
.card-body{font-size:1.05rem;line-height:1.85;color:var(--brownlt);margin-bottom:40px}
.btn{display:inline-block;background:var(--brown);color:var(--white);padding:14px 40px;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;transition:background .2s}
.btn:hover{background:var(--gold)}
footer{background:var(--brown);padding:32px 60px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.foot-logo{font-family:Georgia,serif;font-size:1.1rem;color:var(--cream2);letter-spacing:.12em}
.foot-logo em{font-style:italic;color:var(--beige)}
.foot-copy{font-size:.65rem;letter-spacing:.1em;color:var(--beige)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .7s ease forwards}
@media(max-width:600px){nav,main,footer{padding-left:28px;padding-right:28px}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">AURUM <em>Import Group</em></a>
</nav>

<main>
  <div class="card">
    <div class="card-label">Message Received</div>
    <h1 class="card-title">Thank you for<br>reaching <em>out</em>.</h1>
    <div class="divider"></div>
    <p class="card-body">A member of the Aurum Import Group team will be in touch with you shortly. We look forward to learning more about your needs.</p>
    <a href="index.html" class="btn">Return to Site</a>
  </div>
</main>

<footer>
  <div class="foot-logo">AURUM <em>Import Group</em></div>
  <div class="foot-copy">© 2026 Aurum Import Group, Detroit MI. All rights reserved.</div>
</footer>

</body>
</html>
